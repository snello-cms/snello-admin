<sidebar></sidebar>

<div class="sidebar">
  <adminhome-topbar></adminhome-topbar>
</div>

<div class="sidebar-subpage">
  <h3>
    AI Tools List
  </h3>
  <p>

  </p>
  <button type="button" class="btn btn-add pull-right btn-block" (click)="new()"><i class="fa fa-plus-circle"></i> Add
  </button>
</div>

<div class="main">

  <div class="container-fluid">
    <div class="row">

      <div class="col-md-12 col-sm-12">
        <div class="content list">

          <form>

            <div class="row">
              <div class="clearfix"></div>
              <div class="col-sm-12">

                <div class="filter-wrapper" (keydown.enter)="onSearchEnter($event, datatable)">
                  <div class="fw-search-fields">
                    @if (service.search) {
                      <input id="name" name="name" type="text" class="form-control"
                        placeholder="name" [(ngModel)]="service.search.name_contains"
                        pInputText #name="ngModel">
                    }
                  </div>
                  <div class="fw-spacer"></div>
                  <div class="fw-actions">
                    <div class="btn-group">
                      <button type="button" class="btn btn-search" (click)="reload(datatable)">Search</button>
                      <button type="button" class="btn btn-reset" (click)="reset(datatable)">Undo</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="table-wrapper clearfix">
              <p-table #datatable (onLazyLoad)="lazyLoad($event)" [lazy]="true" [paginator]="true"
                [resizableColumns]="true" [rows]="10"
                [totalRecords]="service.listSize" [value]="model">

                <ng-template let-columns pTemplate="header">
                  <tr class="sort-header">
                    <th pResizableColumn>Index</th>
                    <th pResizableColumn>Name</th>
                    <th pResizableColumn>Method</th>
                    <th pResizableColumn>Description</th>
                    <th pResizableColumn>Active</th>
                    <th class="Operations">Operations</th>
                  </tr>
                </ng-template>
                <ng-template pTemplate="emptymessage">
                  <tr>
                    <td [attr.colspan]="colspan">
                      No results.
                    </td>
                  </tr>
                </ng-template>
                <ng-template let-rowData let-rowIndex="rowIndex" pTemplate="body">
                  <tr>
                    <td class="RowIndex">{{ rowIndex + 1 }}</td>
                    <td class="ui-resizable-column">{{rowData.name}}</td>
                    <td class="ui-resizable-column">{{rowData.method_name}}</td>
                    <td class="ui-resizable-column">{{rowData.description}}</td>
                    <td class="ui-resizable-column">{{rowData.active}}</td>
                    <td>
                      <button type="button" class="btn btn-default btn-square" (click)="edit(rowData)" title="Modify">
                        <i aria-hidden="true" class="fa fa-pencil"></i>
                      </button>
                    </td>
                  </tr>
                </ng-template>
              </p-table>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
