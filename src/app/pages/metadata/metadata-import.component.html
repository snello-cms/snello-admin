<sidebar></sidebar>

<div class="sidebar">
  <adminhome-topbar></adminhome-topbar>
</div>

<div class="sidebar-subpage">
  <h3>Metadata Import</h3>
  <button type="button" class="btn btn-reset btn-block" style="display: block; width: 100%;" (click)="goToMetadataList()">
    <i class="fa fa-arrow-left"></i> Back to List
  </button>
</div>

<div class="main">
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-12 col-sm-12">
        <div class="content list">
          <div class="row" style="margin-bottom: 12px;">
            <div class="col-sm-12">
              <input type="file" accept="application/json,.json" class="form-control" (change)="onImportFileSelected($event)" />
            </div>
          </div>

          @if (importFileName) {
            <p><strong>Selected file:</strong> {{ importFileName }}</p>
          }

          @if (importRows.length > 0) {
            <div class="table-wrapper clearfix">
              <h4>Metadata summary</h4>
              <p-table [value]="importRows" [paginator]="true" [rows]="10" [resizableColumns]="true">
                <ng-template pTemplate="header">
                  <tr class="sort-header">
                    <th>Table Name</th>
                    <th>Fields</th>
                  </tr>
                </ng-template>
                <ng-template pTemplate="body" let-row>
                  <tr>
                    <td>{{ row.tableName }}</td>
                    <td>{{ row.fieldsCount }}</td>
                  </tr>
                </ng-template>
              </p-table>
            </div>

            <div style="margin-top: 16px; text-align: right;">
              <button
                type="button"
                class="btn btn-search"
                [disabled]="!importFile || isImporting"
                (click)="uploadImportFile()">
                Upload Import File
              </button>
            </div>
          }
        </div>
      </div>
    </div>
  </div>
</div>
