<sidebar></sidebar>
<div class="sidebar">
  <adminhome-topbar></adminhome-topbar>
</div>

<div class="sidebar-subpage">
  <h3>Welcome<br><b> {{authService.userDetails?.firstName}} {{authService.userDetails?.lastName}}</b></h3>
</div>

<div class="main">
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-12 col-sm-12">
        <div class="content list">
          <div class="row g-3">
            @for (component of items; track component) {
              <div class="col-lg-4 col-md-6 col-sm-6 col-12" *permit="component.roles">
                <div class="card-home">
                  <i class="{{component.icon}} fa-3x float-end"></i>
                  <a [routerLink]="'/' + component.section + '/' + component.id">
                    <h3>{{component.name}}</h3>
                    @if (component.summary) {
                      <p>
                        {{component.summary}}
                      </p>
                    }
                  </a>
                </div>
              </div>
            }
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
