<sidebar></sidebar>
<div class="sidebar">
  <homepage-topbar></homepage-topbar>
</div>
<div class="sidebar-subpage">

</div>


<div class="main">
  <div class="container-fluid">

    <div class="row">
      <div class="col-md-12 col-sm-12">
        <div class="content list">
          @for (component of model; track component) {
            <div>
              <div class="col-lg-4 col-md-6 col-sm-6 col-xs-12">
                <div class="card-home-user">
                  <a [routerLink]="'/datalist/new/' + component.table_name" class="btn btn-add pull-right">
                    Add
                  </a>
                  <a [routerLink]="'/datalist/list/' + component.table_name">
                    <h3>
                      @if (component.icon) {
                        <i class="{{component.icon}} fa-3x"></i>
                        } {{component.table_name}}
                      </h3>
                    </a>
                  </div>
                </div>
              </div>
            }
          </div>
        </div>
      </div>
    </div>
    @if (false) {
      <div class="row">
        <div class="col-md-12 col-sm-12">
          <div class="content list">
            <b>Extensions</b><br/>
            @for (extension of extensions; track extension) {
              <div>
                <div class="col-lg-4 col-md-6 col-sm-6 col-xs-12">
                  <div class="card-home">
                    <i class="{{extension.icon}} fa-3x pull-right"></i>
                    <a [routerLink]="'/extensions/' + extension.uuid">
                      <h3>{{extension.name}}</h3>
                      @if (extension.description) {
                        <p>
                          {{extension.description}}
                        </p>
                      }
                    </a>
                  </div>
                </div>
              </div>
            }
          </div>
        </div>
      </div>
    }
  </div>
