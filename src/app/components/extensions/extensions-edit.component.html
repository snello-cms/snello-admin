<sidebar></sidebar>

<div class="sidebar">
  <adminhome-topbar></adminhome-topbar>
</div>

<div class="sidebar-subpage">
  <h3>
    Extensions Edit
  </h3>
  <p>
  </p>
</div>


<div class="main">


  <div class="container-fluid">
    <div class="row">


      <div class="form-group clearfix row">
        <label class="label-text col-sm-3">Documents</label>
        <div class="col-sm-9">
          <div class="upload-box">
            <p-fileUpload #fup customUpload="true" (uploadHandler)="uploader($event)"
              [disabled]="uploading" maxFileSize="10000000" auto="true">
            </p-fileUpload>

          </div>
        </div>
      </div>

      @if (uploading) {
        <div class="ui-g-12">
          <div class="ui-g-6">Uploading file {{ uploadedFile }} ...</div>
          <div class="ui-g-6">
            @if (uploadedFile) {
              <p-progressBar [value]="progress"></p-progressBar>
            }
          </div>
        </div>
      }


    </div>
  </div>

  <div class="container-fluid">
    <div class="row">

      <div class="col-md-12 col-sm-12">
        <div class="content view clearfix">
          <form #theform="ngForm">

            <div class="form-group clearfix row">
              <label class="label-text col-sm-3">Label (*)</label>
              <div class="col-sm-9">
                <input [(ngModel)]="element.name" label="Name (*)" name="name" pInputText
                  placeholder="Name (*)">
              </div>
            </div>

            <div class="form-group clearfix row">
              <label class="label-text col-sm-3">Description</label>
              <div class="col-sm-9">
                <input [(ngModel)]="element.description" name="Description" pInputText
                  placeholder="Description">
              </div>
            </div>

            <div class="form-group clearfix row">
              <label class="label-text col-sm-3">
                @if (element.icon) {
                  <i class="{{element.icon}}"></i>
                }&nbsp;&nbsp; Icon (*)</label>
                <div class="col-sm-9">
                  <p-select [options]="iconItems" [(ngModel)]="element.icon" filter="true" name="icon">
                    <ng-template let-item pTemplate="selectedItem">
                      <div style="display:flex; align-items:center; gap:.5rem; min-height:1.75rem; line-height:1;">
                        <i class="{{item.value}}" style="width:1.1rem; text-align:center; font-size:1rem;"></i>
                        <span style="font-size:14px; line-height:1.2;">{{item.label}}</span>
                      </div>
                    </ng-template>
                    <ng-template let-icon pTemplate="item">
                      <div style="display:flex; align-items:center; gap:.5rem; min-height:1.75rem; line-height:1;">
                        <i class="{{icon.value}}" style="width:1.1rem; text-align:center; font-size:1rem;"></i>
                        <span style="font-size:14px; line-height:1.2;">{{icon.label}}</span>
                      </div>
                    </ng-template>
                  </p-select>
                </div>
              </div>

              <div class="form-group clearfix row">
                <label class="label-text col-sm-3">Tag Name</label>
                <div class="col-sm-9">
                  <input [(ngModel)]="element.tag_name" name="tag_name" pInputText placeholder="Tag Name">
                </div>
              </div>


              <div class="btn-group btn-actions pull-right">
                @if (!element.uuid) {
                  <button (click)="save()" [disabled]="!theform.form.valid "
                    class="btn btn-success" type="button">
                    Save
                  </button>
                }
                @if (element.uuid) {
                  <button (click)="update()" [disabled]="!theform.form.valid"
                    class="btn btn-success" type="button">
                    Modify
                  </button>
                }
                @if (element.uuid) {
                  <button (click)="confirmDelete()" class="btn btn-danger" type="button">
                    Delete
                  </button>
                }
                <button (click)="navigateToList()" class="btn btn-default" type="button">Undo</button>
              </div>
            </form>

          </div>
        </div>
      </div>
    </div>
  </div>
