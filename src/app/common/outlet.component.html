<p-confirmDialog
	header="Confirm"
	icon="fa fa-question-circle"
	acceptLabel="Yes"
	rejectLabel="No"
	acceptButtonStyleClass="btn btn-danger"
	rejectButtonStyleClass="btn btn-warning"
	#cd>
</p-confirmDialog>

@for (msg of messages; track $index; let i = $index) {
	<p-message
		[severity]="msg.severity || 'info'"
		[text]="((msg.summary || '') + (msg.detail ? ': ' + msg.detail : ''))"
		[closable]="true"
		(onClose)="removeMessage(i)">
	</p-message>
}

<router-outlet></router-outlet>
